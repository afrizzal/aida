services:
  # ── Postgres 16 + pgvector ────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aida}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aida}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aida}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── One-shot migration (runs prisma migrate deploy on startup) ────────────
  # Uses the builder stage which has the full pnpm node_modules + Prisma CLI
  migrate:
    build:
      context: .
      target: builder
    command: ["pnpm", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aida}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aida}
    restart: "no"

  # ── Next.js app (node server.js — standalone output) ─────────────────────
  # Shared image with worker; only the command differs (D-09)
  app:
    build: .
    command: ["node", "server.js"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aida}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aida}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost,https://localhost}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
      HOSTNAME: "0.0.0.0"
      DB_POOL_MAX: "10"
      UPLOADS_DIR: /data/uploads
      RATE_LIMIT_PEPPER: ${RATE_LIMIT_PEPPER:-}
      # Credential encryption at rest (email IMAP/SMTP passwords, future LLM keys) —
      # required for saving channel credentials in Settings; see .env.example
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
    volumes:
      - uploads_data:/data/uploads
    healthcheck:
      # Alpine's `localhost` resolves to ::1 (IPv6) but Next.js listens on 0.0.0.0 (IPv4 only).
      # Use explicit 127.0.0.1 to force IPv4.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  # ── pg-boss worker (node dist/worker.mjs — esbuild ESM bundle) ──────────
  # Same image as app; independent restart policy and higher memory limit
  worker:
    build: .
    command: ["node", "dist/worker.mjs"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aida}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aida}
      DB_POOL_MAX: "5"
      # Worker decrypts stored IMAP/SMTP credentials for the poll + outbound-send jobs
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Caddy reverse proxy (auto-HTTPS for real domains, local CA for localhost) ──
  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    restart: unless-stopped

volumes:
  # Single source of truth for Postgres data — backup = snapshot this volume (D-11)
  postgres_data:
  # Attachment storage (public intake + composer uploads) — only `app` mounts this;
  # uploads happen synchronously in the request/response cycle, never via a worker job.
  uploads_data:
  caddy_data:
  caddy_config:
